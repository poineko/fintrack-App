name: fintrack
description: Personal & Shared Finance Monitoring App
publish_to: 'none'
version: 1.1.2+2

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  flutter_native_splash: ^2.4.7
  package_info_plus: ^8.3.0

  # ── Database (Drift/SQLite) ───────────────────────────
  drift: ^2.22.0
  drift_flutter: ^0.2.4

  # ── State Management ─────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ───────────────────────────────────────
  go_router: ^14.8.1

  # ── UI & Charts ──────────────────────────────────────
  fl_chart: ^0.70.2

  # ── Utilities ────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

  # ── Code Generators ──────────────────────────────────
  build_runner: ^2.4.9
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/fintrack_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 23 
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icons/fintrack_icon.png"
  web:
    generate: false

flutter_native_splash:
  color: "#1B5E20"
  android_12:
    color: "#1B5E20"
    image: assets/icons/fintrack_icon.png
    icon_background_color: "#1B5E20"
  fullscreen: true